<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Модерация рецензий — The Movie Observer</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-8">
        <div>
            <a href="/editor/dashboard" class="text-sm text-[#005689] hover:underline">← Назад к панели редактора</a>
            <h1 class="text-2xl font-bold text-gray-900 mt-2" style="font-family:'Georgia',serif;">Модерация рецензий</h1>
            <p class="text-gray-500 mt-1">Одобрение и отклонение пользовательских рецензий</p>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200">
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Фильм</th>
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Автор</th>
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Оценка</th>
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Текст рецензии</th>
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Статус</th>
                        <th class="text-right px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(reviews)}">
                        <td colspan="6" class="px-6 py-12 text-center text-gray-400">Рецензий пока нет.</td>
                    </tr>
                    <tr th:each="review : ${reviews}"
                        class="border-b border-gray-100 hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-medium text-gray-900" th:text="${review.movie.title}"></td>
                        <td class="px-6 py-4 text-gray-600" th:text="${review.user.displayName}"></td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1 text-amber-600 font-semibold">
                                ★ <span th:text="${review.rating}"></span>
                            </span>
                        </td>
                        <td class="px-6 py-4 text-gray-700 max-w-xs">
                            <span class="line-clamp-2" th:text="${review.reviewText}"></span>
                        </td>
                        <td class="px-6 py-4">
                            <span th:if="${review.isApproved}"
                                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-800">
                                Одобрена
                            </span>
                            <span th:unless="${review.isApproved}"
                                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-800">
                                На проверке
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <form th:action="@{/editor/reviews/{id}/approve(id=${review.id})}" method="post"
                                      th:if="${!review.isApproved}">
                                    <button type="submit"
                                            class="px-3 py-1.5 text-xs font-semibold text-green-700 border border-green-400 rounded hover:bg-green-600 hover:text-white transition">
                                        Одобрить
                                    </button>
                                </form>
                                <form th:action="@{/editor/reviews/{id}/reject(id=${review.id})}" method="post"
                                      onsubmit="return confirm('Удалить рецензию?')">
                                    <button type="submit"
                                            class="px-3 py-1.5 text-xs font-semibold text-red-600 border border-red-300 rounded hover:bg-red-600 hover:text-white transition">
                                        Отклонить
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
