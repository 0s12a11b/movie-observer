server:
  port: 8090

spring:
  application:
    name: movie-observer
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  datasource:
    url: jdbc:postgresql://localhost:5432/movie_observer
    username: postgres
    password: "123"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework: INFO
    org.liquibase: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,metrics"

